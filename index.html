<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canadian Urbex Archive</title>
  <link rel="icon" type="image/png" href="Logo.png">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="map-page">

  <div id="gate" class="gate" style="display:none;">
    <div class="gate-box">
      <h2>Sign in required</h2>
      <p id="signedInUser" class="gate-user" style="display:none;"></p>
      <button id="googleSignInBtn" type="button">Sign in with Google</button>
      <button id="continueGuestBtn" type="button">Continue without sign in</button>
      <button id="signOutBtn" type="button" style="display:none;">Sign out</button>
      <p id="authStatus" class="gate-error"></p>
    </div>
  </div>

<header>
  <div class="header-brand">
    <img src="Logo.png" alt="Canadian Urbex Archive logo" class="header-logo-icon">
    <span>Canadian Urbex Archive</span>
  </div>
  <div class="header-center">
    <div class="mobile-drawer-header">
      <img src="Logo.png" alt="Canadian Urbex Archive logo" class="drawer-logo-icon">
      <button class="drawer-close-button" type="button" aria-label="Close navigation menu">×</button>
    </div>
    <a href="index.html" class="top-nav-link is-active">Map</a>
    <a href="resources.html" class="top-nav-link">Resources</a>
  </div>
  <div class="header-right">
    <button class="mobile-menu-button" type="button" aria-label="Open navigation menu"><span></span></button>
  <div id="accountMenuWrap" class="account-menu-wrap" style="display:none;">
    <button id="accountMenuBtn" class="account-menu-btn" type="button" aria-expanded="false">
      <span id="accountMenuName" class="account-menu-name">Account</span>
      <span id="accountMenuAvatar" class="account-menu-avatar">U</span>
    </button>
    <div id="accountDropdown" class="account-dropdown" style="display:none;">
      <button id="accountSettingsBtn" class="account-dropdown-item" type="button">Settings</button>
      <button id="accountSignOutBtn" class="account-dropdown-item account-dropdown-item-danger" type="button">Sign Out</button>
    </div>
  </div>
  <button id="headerSignInBtn" class="account-menu-btn" type="button" style="display:none;">Sign in</button>
  </div>
</header>

<button id="addSpotBtn" type="button" aria-label="Add a spot" style="display:none;">
  <svg class="add-spot-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- Pin shape — light grey-blue to match button controls -->
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
          fill="#c8d8ff" opacity="0.8"/>
    <!-- Dark inner circle -->
    <circle cx="12" cy="9" r="3.4" fill="rgba(12,22,44,0.95)"/>
  </svg>
</button>

<div id="map"></div>
<div id="imageOverlay" class="image-overlay" style="display:none;"><img alt=""></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
